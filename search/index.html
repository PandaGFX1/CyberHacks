m!important;transition:border-left-color .15s!important}.pagefind-ui__result-nested-title{color:var(--purple-2)!important;font-size:.75rem!important;font-weight:600!important;margin-bottom:0!important;border:none!important;padding:0!important}.pagefind-ui__result-nested-title a{color:inherit!important;text-decoration:none!important;border:none!important}.pagefind-ui__result-excerpt{color:var(--text-muted)!important;font-size:.72rem!important;line-height:1.4!important;margin:0!important;padding-top:0!important}mark{background:#7c5ce84d!important;color:var(--purple-1)!important;border-radius:3px!important;padding:0 2px!important}.pagefind-ui__message{color:var(--text-muted)!important;font-size:.8rem!important;margin-bottom:1rem!important}.pagefind-ui__search-clear{color:var(--text-muted)!important;background:transparent!important}.pagefind-ui__button{background:var(--surface)!important;border:1px solid var(--border)!important;color:var(--text-muted)!important;border-radius:8px!important;transition:border-color .15s,color .15s!important}.pagefind-ui__button:hover{border-color:var(--purple-3)!important;color:var(--purple-1)!important}.pagefind-ui__result-nested-title:before{display:none!important;content:none!important}.pagefind-ui__result-link-arrow{display:none!important}.pagefind-ui__result-title:after,.pagefind-ui__result-nested-title:after{display:none!important;content:none!important}.pagefind-ui__result-nested .pagefind-ui__result-link:before{display:none!important;content:""!important}.pagefind-ui__result-nested,.pagefind-ui__result-nested *,.pagefind-ui__result-excerpt{border-top:none!important;border-right:none!important;border-bottom:none!important;box-shadow:none!important}.pagefind-ui__result-nested{border-left:2px solid var(--border-2)!important}.pagefind-ui__result-nested:hover{border-left-color:var(--purple-3)!important}.pagefind-ui__result-nested p,.pagefind-ui__result-nested div,.pagefind-ui__result-nested span{margin:0!important;padding:0!important}
</style></head> <body> <div class="bg-gradient"></div> <div class="bg-noise"></div> <div class="bg-grid"></div> <div class="site-wrap">  <header class="site-header"> <div class="header-inner"> <a href="/" class="logo"> <span class="logo-icon">⬡</span> <span class="logo-text">CyberHacks</span> </a> <nav class="header-nav"> <a href="/knowledge" class="nav-link "> Knowledge </a><a href="/techniques" class="nav-link "> Techniques </a><a href="/playbooks" class="nav-link "> Playbooks </a><a href="/tools" class="nav-link "> Tools </a><a href="/resources" class="nav-link "> Resources </a><a href="/labs" class="nav-link "> Labs </a> </nav> <div class="hdr-search" id="hdr-search"> <div class="hdr-search-box"> <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:var(--text-dim);flex-shrink:0"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg> <input id="hdr-input" type="text" placeholder="Search notes..." autocomplete="off" spellcheck="false"> <kbd>⌘K</kbd> </div> <div class="hdr-dropdown" id="hdr-dropdown" style="display:none"> <div id="hdr-results"></div> <a id="hdr-all" href="/search" class="hdr-view-all">View all results →</a> </div> </div> </div> </header>  <script>
(function(){
  let pf = null;
  let timer = null;
  const input = document.getElementById('hdr-input');
  const dropdown = document.getElementById('hdr-dropdown');
  const results = document.getElementById('hdr-results');
  const viewAll = document.getElementById('hdr-all');
  if(!input) return;

  async function init() {
    if(pf) return pf;
    try {
      pf = await import('/pagefind/pagefind.js');
      await pf.init();
    } catch(e){ pf=null; }
    return pf;
  }

  input.addEventListener('focus', init);

  input.addEventListener('input', ()=>{
    clearTimeout(timer);
    timer = setTimeout(async ()=>{
      const q = input.value.trim();
      if(!q){ dropdown.style.display='none'; return; }

      const lib = await init();
      if(!lib){
        results.innerHTML = '<div class="hdr-empty">Run a build to enable search.</div>';
        dropdown.style.display='block';
        return;
      }

      const res = await lib.search(q);
      const top = await Promise.all(res.results.slice(0,5).map(r=>r.data()));
      viewAll.href = '/search?q='+encodeURIComponent(q);

      if(!top.length){
        results.innerHTML = '<div class="hdr-empty">No results for "'+q+'"</div>';
      } else {
        results.innerHTML = top.map(r=>{
          const parts = r.url.split('/').filter(Boolean);
          const cat = parts[0]||'';
          const sub = parts.length>2 ? parts[1].replace(/-/g,' ') : '';
          const title = (r.meta&&r.meta.title||'')
            .replace(/\s*[—–-]+\s*CyberHacks\s*$/i,'').trim()
            || parts[parts.length-1].replace(/-/g,' ');
          const path = sub ? `<span>${cat}</span> / ${sub}` : `<span>${cat}</span>`;
          const excerpt = (r.excerpt||'')
            .replace(/<(?!\/?mark)[^>]+>/g,'')
            .replace(/\s+/g,' ')
            .replace(/^[\s\/\-–—]+/,'')
            .trim()
            .slice(0,90);
          return '<a href="'+r.url+'" class="hdr-result">'
            +'<div class="hdr-result-title">'+title+'</div>'
            +'<div class="hdr-result-path">'+path+'</div>'
            +(excerpt?'<div class="hdr-result-excerpt">'+excerpt+'</div>':'')
            +'</a>';
        }).join('');
      }
      dropdown.style.display='block';
    }, 180);
  });

  document.addEventListener('click', e=>{
    if(!document.getElementById('hdr-search').contains(e.target))
      dropdown.style.display='none';
  });

  document.addEventListener('keydown', e=>{
    if((e.metaKey||e.ctrlKey)&&e.key==='k'){
      e.preventDefault(); input.focus(); input.select();
    }
    if(e.key==='Escape'){ dropdown.style.display='none'; input.blur(); }
    if(e.key==='Enter'&&dropdown.style.display!=='none'&&input.value.trim())
      window.location.href='/search?q='+encodeURIComponent(input.value.trim());
  });
})();
</script> <main class="search-page"> <div class="search-header"> <h1>Search</h1> <p>Search across all notes, tools, playbooks, and techniques.</p> </div> <div id="search" class="search-widget"></div> </main>  </div> </body></html>  <script>
  window.addEventListener('DOMContentLoaded', () => {
    const script = document.createElement('script');
    script.src = '/pagefind/pagefind-ui.js';
    script.onload = () => {
      new PagefindUI({
        element: '#search',
        showSubResults: true,
        excerptLength: 15,
        showImages: false,
      });

      // Make entire result block and sub-results clickable
      document.getElementById('search').addEventListener('click', (e) => {
        if (e.target.closest('a')) return; // already a link click

        // Check if clicked inside a sub-result
        const nested = e.target.closest('.pagefind-ui__result-nested');
        if (nested) {
          const link = nested.querySelector('a');
          if (link) { link.click(); return; }
        }

        // Otherwise click the main result title
        const result = e.target.closest('.pagefind-ui__result');
        if (!result) return;
        const link = result.querySelector('.pagefind-ui__result-title a');
        if (link) link.click();
      });

      // Watch for new results (pagefind renders dynamically)
      const observer = new MutationObserver(() => {
        document.querySelectorAll('.pagefind-ui__result').forEach(result => {
          result.style.cursor = 'pointer';
        });
      });
      observer.observe(document.getElementById('search'), { childList: true, subtree: true });
    };
    script.onerror = () => {
      document.getElementById('search').innerHTML =
        '<p style="color:#8070a8;padding:1rem">Search index not built yet. Run <code>npx astro build</code> first.</p>';
    };
    document.head.appendChild(script);

    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = '/pagefind/pagefind-ui.css';
    document.head.appendChild(link);

    // Handle ?q= param to pre-fill search from other pages
    const params = new URLSearchParams(window.location.search);
    const q = params.get('q');
    if (q) {
      setTimeout(() => {
        const input = document.querySelector('.pagefind-ui__search-input');
        if (input) {
          input.value = q;
          input.dispatchEvent(new Event('input', { bubbles: true }));
        }
      }, 300);
    }
  });
</script>
